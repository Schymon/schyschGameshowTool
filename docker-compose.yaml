services:
  frontend:
    image: ghcr.io/schymon/schyschsgameshowtool-frontend:latest
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${BACKEND_URL:-http://backend:3001}
    depends_on:
      - backend
    networks:
      - gameshow-network

  backend:
    image: ghcr.io/schymon/schyschsgameshowtool-backend:latest
    ports:
      - "3001:3001"
    env_file:
      - backend.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gameshow-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-gameshow}
      - POSTGRES_USER=${POSTGRES_USER:-gameshow}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-gameshow123}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gameshow} -d ${POSTGRES_DB:-gameshow}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gameshow-network

volumes:
  postgres_data:

networks:
  gameshow-network:
    driver: bridge
