services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:3001
    depends_on:
      - backend
    networks:
      - gameshow-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://gameshow:gameshow123@db:5432/gameshow
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
      - BETTER_AUTH_SECRET=your-super-secret-key-change-in-production
      - CORS_ORIGIN=http://localhost:3000
      - PORT=3001
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gameshow-network

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=gameshow
      - POSTGRES_USER=gameshow
      - POSTGRES_PASSWORD=gameshow123
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gameshow -d gameshow"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gameshow-network

volumes:
  postgres_data:

networks:
  gameshow-network:
    driver: bridge
